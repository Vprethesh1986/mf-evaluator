<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personalised mutual fund evaluation — get a suitability score, investor profile, and buy/hold/sell recommendation in minutes." />
    <meta name="theme-color" content="#0d0d18" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Mutual Fund Evaluator</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #0d0d18;
        color: #f5f0e8;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Loading splash */
      #splash {
        position: fixed; inset: 0;
        background: #0d0d18;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-logo {
        font-family: 'Georgia', serif;
        font-size: 28px;
        color: #d4a017;
        letter-spacing: 2px;
      }
      .splash-sub {
        font-size: 12px;
        color: #6a6258;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .splash-bar {
        width: 120px; height: 2px;
        background: rgba(255,255,255,0.06);
        border-radius: 1px;
        overflow: hidden;
      }
      .splash-fill {
        height: 100%;
        background: linear-gradient(90deg, #b8860b, #d4a017);
        border-radius: 1px;
        animation: load 0.8s ease forwards;
      }
      @keyframes load { from { width: 0% } to { width: 100% } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">MF Evaluator</div>
      <div class="splash-sub">Investment Advisory</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) splash.classList.add('hidden');
          setTimeout(function() { if (splash) splash.remove(); }, 400);
        }, 900);
      });
    </script>
  </body>
</html>
